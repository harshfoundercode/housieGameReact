<body>
  <div class="navbar">
    <h1>🎮 Live Tambola Game</h1>
    <a href="/user">← Back to User Panel</a>
  </div>

  <div class="container">
    <div class="game-grid">
      <div class="main-area">
        <h2>Current Number</h2>
        <div class="number-display" id="numberDisplay">-</div>
        
        <div class="game-info">
          <p>Game Status: <strong id="gameStatus">Live</strong> | Called: <strong id="totalCalled">0</strong>/90</p>
        </div>
      </div>

      <div class="widget">
        <h3>🏆 Winners</h3>
        <div class="winners-list" id="winnersList">
          <p style="color: #999;">No winners yet</p>
        </div>
      </div>

      <div class="widget">
        <h3>📊 Live Ranking</h3>
        <div class="ranking-list" id="rankingList">
          <p style="color: #999;">Loading rankings...</p>
        </div>
      </div>

      <div class="widget">
        <h3>📞 Called Numbers</h3>
        <div class="called-numbers" id="calledNumbers"></div>
      </div>

      <div style="grid-column: 1 / 4;">
        <div class="widget">
          <h3>🎫 All Game Tickets</h3>
          <div class="search-container">
            <div style="position: relative;">
              <input type="text" id="ticketSearch" placeholder="🔍 Search by ticket number, player name, or user ID...">
              <button id="clearSearch" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 16px; display: none;">✕</button>
            </div>
            <div class="ticket-count">Showing <span id="ticketCount">0</span> of <span id="totalTicketCount">0</span> tickets</div>
          </div>
          <div class="ticket-grid" id="ticketsContainer">
            <p style="text-align: center; color: #999;">Loading all tickets...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="ticketModal" class="ticket-modal hidden" aria-hidden="true">
    <div class="ticket-modal-content">
      <button class="ticket-modal-close" onclick="closeTicketModal()">✕</button>
      <h3 id="modalTicketTitle">Ticket Details</h3>
      <p id="modalTicketMeta"></p>
      <div id="modalTicketNumbers" class="ticket-grid"></div>
      <p id="modalTicketMatched" style="margin-top: 12px; color: #ffd700;"></p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const gameId = '<%= game_id %>';
    let currentRoundId = null;
    let allTickets = [];
    let calledNumbers = [];
    let filteredTickets = [];
    let winners = [];

    function parseTicketGrid(ticket) {
      let grid = ticket.ticket_data;
      try {
        if (typeof grid === 'string') {
          grid = JSON.parse(grid);
        }
      } catch (e) {
        grid = [[], [], []];
      }

      if (!Array.isArray(grid)) {
        grid = [[], [], []];
      }

      const normalized = grid.slice(0, 3).map((row) => {
        const safeRow = Array.isArray(row) ? row.slice(0, 9) : [];
        const paddedRow = [...safeRow];
        while (paddedRow.length < 9) paddedRow.push(null);
        return paddedRow;
      });

      while (normalized.length < 3) {
        normalized.push(Array(9).fill(null));
      }

      return normalized;
    }

    function parseTicketNumbers(ticket) {
      let parsed = ticket.ticket_data;
      try {
        if (typeof parsed === 'string') {
          parsed = JSON.parse(parsed);
        }
      } catch (e) {
        parsed = [];
      }

      if (!Array.isArray(parsed)) return [];

      return parsed
        .flat(Infinity)
        .filter(n => n !== null && n !== undefined && n !== 0 && n !== '')
        .map(n => Number(n))
        .filter(n => !isNaN(n))
        .sort((a, b) => a - b);
    }

    function getTicketMatchData(ticket) {
      const grid = parseTicketGrid(ticket);
      const flatNumbers = grid.flat().filter(n => n !== null && n !== undefined && n !== 0 && n !== '').map(n => Number(n)).filter(n => !isNaN(n));
      const matchedList = [...new Set(flatNumbers.filter(num => calledNumbers.includes(num)))];
      return {
        grid,
        flatNumbers,
        matchedList,
        matchedCount: matchedList.length,
      };
    }

    function showTicketDetail(ticketId) {
      const ticket = allTickets.find(t => t.ticket_id === ticketId);
      if (!ticket) return;

      const { flatNumbers, matchedList, matchedCount } = getTicketMatchData(ticket);
      document.getElementById('modalTicketTitle').textContent = `Ticket #${ticket.ticket_number} (ID: ${ticket.ticket_id})`;
      document.getElementById('modalTicketMeta').innerHTML = `Owner: <strong>${ticket.user_name || 'Unsold'}</strong> ${ticket.user_id ? `(ID: ${ticket.user_id})` : ''}<br>Status: <strong>${ticket.status}</strong> | Filled: <strong>${matchedCount}/${flatNumbers.length}</strong> (${flatNumbers.length ? Math.round((matchedCount / flatNumbers.length) * 100) : 0}%)`;
      document.getElementById('modalTicketNumbers').innerHTML = flatNumbers.map(num => `
        <div class="ticket-num ${calledNumbers.includes(num) ? 'matched' : ''}">${num}</div>
      `).join('');
      document.getElementById('modalTicketMatched').textContent = `Matched numbers: ${matchedList.join(', ') || 'None'}`;
      document.getElementById('ticketModal').classList.remove('hidden');
      document.getElementById('ticketModal').setAttribute('aria-hidden', 'false');
    }

    function closeTicketModal() {
      document.getElementById('ticketModal').classList.add('hidden');
      document.getElementById('ticketModal').setAttribute('aria-hidden', 'true');
    }

    // Load current live round
    async function loadCurrentRound() {
      try {
        const response = await fetch(`/api/round/current-game/${gameId}`);
        const result = await response.json();
        if (result.success && result.data) {
          currentRoundId = result.data.round_id;
          document.getElementById('gameStatus').textContent = result.data.status;
        } else {
          document.getElementById('gameStatus').textContent = 'No live round';
        }
      } catch (err) {
        console.error('Error loading round:', err);
      }
    }

    // Load all tickets for this game
    async function loadAllTickets() {
      try {
        const response = await fetch(`/api/booking/all-tickets/${gameId}`);
        const result = await response.json();
        
        if (result.success && result.data && result.data.length > 0) {
          allTickets = result.data;
          filteredTickets = [...allTickets];
          updateTicketDisplay();
          updateRanking();
          updateTicketCount();
        } else {
          allTickets = [];
          filteredTickets = [];
          updateTicketDisplay();
          updateRanking();
          updateTicketCount();
        }
      } catch (err) {
        console.error('Error loading tickets:', err);
      }
    }

    function updateTicketDisplay() {
      const container = document.getElementById('ticketsContainer');
      if (filteredTickets.length === 0) {
        container.innerHTML = '<p style="text-align: center; color: #999;">No tickets found matching your search</p>';
        return;
      }

      container.innerHTML = filteredTickets.map((ticket) => {
        const { grid, flatNumbers, matchedList, matchedCount } = getTicketMatchData(ticket);
        const totalNumbers = flatNumbers.length;
        const percentage = totalNumbers > 0 ? Math.round((matchedCount / totalNumbers) * 100) : 0;
        const ownerName = ticket.user_name ? ticket.user_name : 'Not sold';
        
        const isWinner = ticket.winner_id && ticket.prize_name;
        const winnerLabel = isWinner 
          ? `🏆 Winner: ${ticket.win_type} (${ticket.prize_name})` 
          : '';
        const winnerHtml = winnerLabel ? `<p class="winner-tag">${winnerLabel}</p>` : '';

        return `
          <div class="ticket-item ${isWinner ? 'winner' : ''}" onclick="showTicketDetail(${ticket.ticket_id})" role="button" tabindex="0">
            <h4>🎟️ Ticket #${ticket.ticket_number}</h4>
            <p>Owner: <strong>${ownerName}</strong>${ticket.user_id ? ` (ID: ${ticket.user_id})` : ''} | Status: <span class="status-badge">${ticket.status}</span> | Filled: <strong>${matchedCount}/${totalNumbers}</strong> (${percentage}%)</p>
            <div class="ticket-numbers">
              ${grid
                .flat()
                .map((num) => {
                  const isEmpty = num === null || num === undefined || num === '' || num === 0;
                  return isEmpty
                    ? '<div class="ticket-num empty"></div>'
                    : `<div class="ticket-num ${calledNumbers.includes(Number(num)) ? 'matched' : ''}" id="num-${ticket.ticket_id}-${num}">${num}</div>`;
                })
                .join('')}
            </div>
            ${winnerHtml}
          </div>
        `;
      }).join('');
    }

    function updateRanking() {
      const rankingContainer = document.getElementById('rankingList');
      if (allTickets.length === 0) {
        rankingContainer.innerHTML = '<p style="color: #999;">No tickets to rank</p>';
        return;
      }

      const rankedTickets = allTickets
        .map((ticket) => {
          const { matchedCount, flatNumbers } = getTicketMatchData(ticket);
          const totalNumbers = flatNumbers.length;
          const percentage = totalNumbers > 0 ? Math.round((matchedCount / totalNumbers) * 100) : 0;

          return {
            ...ticket,
            filledCount: matchedCount,
            totalNumbers,
            percentage,
          };
        })
        .sort((a, b) => b.filledCount - a.filledCount || a.ticket_number - b.ticket_number);

      rankingContainer.innerHTML = rankedTickets.map((ticket, index) => {
        const rank = index + 1;
        const rankClass = rank <= 3 ? `rank-${rank}` : '';
        const ownerLabel = ticket.user_name ? ticket.user_name : 'Unsold';
        const winnerBadge = ticket.winner_id ? ` 🏆 ${ticket.win_type}` : '';
        
        return `
          <div class="ranking-item ${rankClass}">
            <div>
              <span class="rank-badge">#${rank}</span>
              <strong>${ownerLabel}</strong> - Ticket #${ticket.ticket_number}${winnerBadge}
            </div>
            <div>
              <strong>${ticket.filledCount}/${ticket.totalNumbers}</strong> (${ticket.percentage}%)
            </div>
          </div>
        `;
      }).join('');
    }

    function updateTicketCount() {
      document.getElementById('ticketCount').textContent = filteredTickets.length;
      document.getElementById('totalTicketCount').textContent = allTickets.length;
    }

    function filterTickets(searchTerm) {
      if (!searchTerm.trim()) {
        filteredTickets = [...allTickets];
      } else {
        const term = searchTerm.toLowerCase();
        filteredTickets = allTickets.filter(ticket => {
          return (
            ticket.ticket_number.toString().includes(term) ||
            (ticket.user_name || '').toLowerCase().includes(term) ||
            (ticket.user_id || '').toString().includes(term)
          );
        });
      }
      updateTicketDisplay();
      updateTicketCount();
    }

    // Update called numbers display
    async function updateCalledNumbers() {
      if (!currentRoundId) return;
      
      try {
        const response = await fetch(`/api/game/status?round_id=${currentRoundId}`);
        const result = await response.json();
        
        if (result.success && result.data) {
          const data = result.data;
          document.getElementById('totalCalled').textContent = data.total_called || 0;
          
          if (data.called_numbers) {
            calledNumbers = data.called_numbers;
            document.getElementById('calledNumbers').innerHTML = 
              calledNumbers.map(n => `<span class="number-badge">${n}</span>`).join('');

            updateTicketDisplay();
            updateRanking();
          }

          if (data.round_status) {
            document.getElementById('gameStatus').textContent = data.round_status;
          }
        }
      } catch (err) {
        console.error('Error updating called numbers:', err);
      }
    }

    // Load winners
    async function loadWinners() {
      if (!currentRoundId) return;
      
      try {
        const response = await fetch(`/api/game/winners-list?round_id=${currentRoundId}`);
        const result = await response.json();
        
        winners = result.success && result.data ? result.data : [];

        if (winners.length > 0) {
          document.getElementById('winnersList').innerHTML = winners.map(w => `
            <div class="winner-item">
              <strong>${w.user_name || 'Ticket won'}</strong><br>
              Prize: ${w.prize_name} - ₹${w.amount}
            </div>
          `).join('');
        } else {
          document.getElementById('winnersList').innerHTML = '<p style="color: #999;">No winners yet</p>';
        }

        updateTicketDisplay();
      } catch (err) {
        console.error('Error loading winners:', err);
      }
    }

    // Socket listeners
    socket.on('number_called', (data) => {
      if (data.round_id === currentRoundId || data.game_id === gameId) {
        document.getElementById('numberDisplay').textContent = data.number;
        updateCalledNumbers();
        // Reload tickets to update called_count
        loadAllTickets();
      }
    });

    socket.on('winner_update', (data) => {
      if (data.round_id === currentRoundId) {
        loadWinners();
        // Reload tickets to show updated winner status
        loadAllTickets();
      }
    });

    socket.on('winner_created', (data) => {
      if (data.round_id === currentRoundId || data.game_id === gameId) {
        loadWinners();
        loadAllTickets();
      }
    });

    socket.on('game_over', (data) => {
      if (data.round_id === currentRoundId || data.game_id === gameId) {
        alert('Game Completed!');
        document.getElementById('gameStatus').textContent = 'Completed';
      }
    });

    async function loadLiveGame() {
      await loadCurrentRound();
      await loadAllTickets();
      await updateCalledNumbers();
      await loadWinners();
    }

    window.addEventListener('load', async () => {
      await loadLiveGame();

      // Add search functionality
      const searchInput = document.getElementById('ticketSearch');
      const clearButton = document.getElementById('clearSearch');

      searchInput.addEventListener('input', (e) => {
        filterTickets(e.target.value);
        clearButton.style.display = e.target.value ? 'block' : 'none';
      });

      clearButton.addEventListener('click', () => {
        searchInput.value = '';
        filterTickets('');
        clearButton.style.display = 'none';
        searchInput.focus();
      });

      // Add focus/blur effects for better UX
      searchInput.addEventListener('focus', () => {
        searchInput.style.background = 'rgba(255,255,255,0.2)';
      });
      searchInput.addEventListener('blur', () => {
        searchInput.style.background = 'rgba(255,255,255,0.1)';
      });
    });

    setInterval(updateCalledNumbers, 2000);
    setInterval(loadWinners, 3000);
  </script>
</body>
</html> -->
